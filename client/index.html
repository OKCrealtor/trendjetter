<!doctype html>
<html lang="en">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- ── Primary SEO ─────────────────────────────────────────────────────── -->
    <title>TrendJetter — AI Hashtag Generator & Trend Intelligence Tool</title>
    <meta name="description" content="TrendJetter uses AI to score, rank, and recommend the best hashtags for Instagram, TikTok, YouTube, and more. Find trending hashtags in seconds — free to start." />

    <link rel="canonical" href="https://www.trendjetter.io/" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="author" content="TrendJetter" />

    <!-- ── Open Graph ──────────────────────────────────────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://www.trendjetter.io/" />
    <meta property="og:site_name"   content="TrendJetter" />
    <meta property="og:title"       content="TrendJetter — AI Hashtag Generator & Trend Intelligence" />
    <meta property="og:description" content="Stop guessing which hashtags work. TrendJetter scores every hashtag across 7 dimensions — reach, competition, trend velocity, and more. Free to start." />
    <meta property="og:image"       content="https://www.trendjetter.io/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"   content="TrendJetter — AI Hashtag Intelligence Platform" />
    <meta property="og:locale"      content="en_US" />

    <!-- ── Twitter / X Card ───────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@trendjetter" />
    <meta name="twitter:title"       content="TrendJetter — AI Hashtag Generator & Trend Intelligence" />
    <meta name="twitter:description" content="Stop guessing which hashtags work. TrendJetter scores every hashtag across 7 dimensions. Free to start." />
    <meta name="twitter:image"       content="https://www.trendjetter.io/og-image.png" />

    <!-- ── JSON-LD Structured Data ────────────────────────────────────────── -->
    <script type="application/ld+json">
    {

      "@graph": [
        {
          "@type": "SoftwareApplication",
          "@id": "https://www.trendjetter.io/#software",
          "name": "TrendJetter",
          "url": "https://www.trendjetter.io/",
          "description": "AI-powered hashtag generator and trend intelligence platform for Instagram, TikTok, YouTube, X, Facebook, and LinkedIn. Scores hashtags across 7 dimensions including reach, competition, trend velocity, and local relevance.",
          "applicationCategory": "SocialNetworkingApplication",
          "operatingSystem": "Web",
          "offers": [
            {
              "@type": "Offer",
              "name": "Free",
              "price": "0",
              "priceCurrency": "USD",
              "description": "5 hashtag generations per month"
            },
            {
              "@type": "Offer",
              "name": "Pro",
              "price": "29",
              "priceCurrency": "USD",
              "priceSpecification": {
                "@type": "UnitPriceSpecification",
                "price": "29",
                "priceCurrency": "USD",
                "unitCode": "MON"
              },
              "description": "1,000 hashtag generations per month with full AI intelligence"
            },
            {
              "@type": "Offer",
              "name": "Agency",
              "price": "99",
              "priceCurrency": "USD",
              "priceSpecification": {
                "@type": "UnitPriceSpecification",
                "price": "99",
                "priceCurrency": "USD",
                "unitCode": "MON"
              },
              "description": "5,000 hashtag generations per month for teams and agencies"
            }
          ],
          "featureList": [
            "AI hashtag scoring across 7 dimensions",
            "Trend velocity tracking",
            "Local market intelligence",
            "Instagram hashtag generator",
            "TikTok hashtag generator",
            "YouTube hashtag generator",
            "Hashtag analytics dashboard",
            "Smart hashtag collections"
          ],
          "screenshot": "https://www.trendjetter.io/og-image.png",
          "aggregateRating": {
            "@type": "AggregateRating",
            "ratingValue": "4.8",
            "ratingCount": "124"
          }
        },
        {
          "@type": "Organization",
          "@id": "https://www.trendjetter.io/#organization",
          "name": "TrendJetter",
          "url": "https://www.trendjetter.io/",
          "logo": "https://www.trendjetter.io/android-chrome-192x192.png",

            "@type": "ContactPoint",
            "email": "hi@trendjetter.io",

        {

          "@id": "https://www.trendjetter.io/#website",

          "name": "TrendJetter",
          "description": "AI hashtag generator and trend intelligence platform",
          "publisher": { "@id": "https://www.trendjetter.io/#organization" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://www.trendjetter.io/#/generator?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
